<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Tracker - Support</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <!-- Same navbar as above -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Money Tracker</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="membership.html">Memberships</a></li>
                    <li class="nav-item"><a class="nav-link active" href="contact.html">Support</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <h2>Contact Support</h2>
        <form id="contactForm" class="row g-3">
            <div class="col-md-6"><input type="text" id="name" class="form-control" placeholder="Your Name" required></div>
            <div class="col-md-6"><input type="email" id="email" class="form-control" placeholder="Email" required></div>
            <div class="col-12"><textarea id="message" class="form-control" rows="5" placeholder="Your Message" required></textarea></div>
            <button type="submit" class="btn btn-primary">Send Message</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
